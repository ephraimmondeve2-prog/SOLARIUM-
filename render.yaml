services:
  - type: web
    name: soleo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: BASE_URL
        sync: false
      - key: PAY_NUMBER
        sync: false
      - key: ADMIN_WHATSAPP
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: DATABASE_URL      # Postgres persistant (Neon/Supabase). Vide = SQLite.
        sync: false
      - key: REPORT_PRICE
        value: "2000"
      - key: CURRENCY
        value: "XOF"
    # Email optionnel du rapport : ajoutez SMTP_HOST/PORT/USER/PASS/FROM si souhaité.
